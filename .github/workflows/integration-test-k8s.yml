name: Integration Test (K8s)

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions: read-all

jobs:
  integration-test:
    if: github.repository_owner == 'redhat-best-practices-for-k8s'
    name: KPI Collection on K8s
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Deploy K8s cluster with monitoring
        uses: palmsoftware/quick-k8s@v0.0.65
        with:
          enableClusterMonitoring: 'true'

      - name: Wait for monitoring stack
        timeout-minutes: 10
        run: |
          kubectl rollout status statefulset/prometheus-k8s -n monitoring --timeout=300s
          kubectl rollout status deployment/thanos-query -n monitoring --timeout=300s

      - name: Build kpi-collector
        run: make

      - name: Wait for scrape data and collect KPIs
        timeout-minutes: 10
        run: |
          kubectl port-forward -n monitoring svc/thanos-query 9090:9090 &
          sleep 3

          for i in $(seq 1 60); do
            count=$(curl -sf 'http://localhost:9090/api/v1/query?query=up' \
              | jq '.data.result | length' 2>/dev/null || echo 0)
            [ "$count" -gt 0 ] && echo "Thanos has data ($count series)" && break
            echo "  attempt $i/60: waiting for scrape data..."
            sleep 5
          done

          if [ "$count" -eq 0 ] 2>/dev/null || [ -z "$count" ]; then
            echo "FAIL: no metric data after 5 minutes"
            exit 1
          fi

          ./kpi-collector run \
            --cluster-name integration-test \
            --cluster-type ran \
            --token unused \
            --thanos-url http://localhost:9090 \
            --kpis-file kpi-profiles/kpis-quickstart.json \
            --once

      - name: Verify cluster was stored
        run: |
          output=$(./kpi-collector db show clusters)
          echo "$output"
          echo "$output" | grep -q "integration-test"

      - name: Verify KPIs were collected
        run: |
          output=$(./kpi-collector db show kpis -o json)
          echo "$output"

          count=$(echo "$output" | jq 'length')
          echo "Collected $count metric(s)"

          if [ "$count" -lt 1 ]; then
            echo "FAIL: expected at least 1 metric, got $count"
            exit 1
          fi

      - name: Verify each quickstart KPI has data
        run: |
          for kpi in node-cpu-usage cluster-uptime; do
            output=$(./kpi-collector db show kpis --name "$kpi" -o json)
            count=$(echo "$output" | jq 'length')
            echo "$kpi: $count metric(s)"
            if [ "$count" -lt 1 ]; then
              echo "FAIL: KPI '$kpi' has no data in the database"
              exit 1
            fi
          done

      - name: Verify no unexpected errors
        run: |
          output=$(./kpi-collector db show errors)
          echo "$output"
          echo "$output" | grep -q "No errors found."

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kpi-collector-artifacts
          path: kpi-collector-artifacts/
