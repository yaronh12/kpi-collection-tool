name: TLS Config Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions: read-all

jobs:
  tls-lint:
    name: TLS Config Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run TLS Config Lint
        uses: sebrandon1/tls-config-lint@v1
        with:
          languages: go
          severity-threshold: high
